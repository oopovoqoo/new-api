name: Publish Docker image (ovaijisuan)

on:
  push:
    branches:
      - ovaijisuan
  workflow_dispatch:
    inputs:
      name:
        description: "reason"
        required: false

jobs:
  build_single_arch:
    name: Build & push (${{ matrix.arch }}) [native]
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            runner: ubuntu-latest
          - arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    permissions:
      packages: write
      contents: read
      id-token: write
    steps:
      - name: Check out (shallow)
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Determine ovaijisuan version
        id: version
        run: |
          UPSTREAM=$(git tag --sort=-version:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1)
          [ -z "$UPSTREAM" ] && UPSTREAM="custom"
          VERSION="${UPSTREAM}-ovaijisuan-$(date +'%Y%m%d')-$(git rev-parse --short HEAD)"
          echo "$VERSION" > VERSION
          echo "value=$VERSION" >> $GITHUB_OUTPUT
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "Publishing version: $VERSION for ${{ matrix.arch }}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to Docker Hub
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to ACR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ secrets.ACR_REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build & push single-arch
        id: build
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          push: true
          tags: |
            arronlee/new-api:ovaijisuan-${{ matrix.arch }}
            arronlee/new-api:${{ steps.version.outputs.value }}-${{ matrix.arch }}
            ${{ secrets.ACR_REGISTRY }}/reputationly/new-api:ovaijisuan-${{ matrix.arch }}
            ${{ secrets.ACR_REGISTRY }}/reputationly/new-api:${{ steps.version.outputs.value }}-${{ matrix.arch }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: mode=max
          sbom: true

      - name: Output digest
        run: |
          echo "### Docker Image Digest (${{ matrix.arch }})" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "arronlee/new-api:ovaijisuan-${{ matrix.arch }}" >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.build.outputs.digest }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

  create_manifests:
    name: Create multi-arch manifests
    needs: [build_single_arch]
    runs-on: ubuntu-latest
    steps:
      - name: Check out (shallow)
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Determine ovaijisuan version
        id: version
        run: |
          UPSTREAM=$(git tag --sort=-version:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1)
          [ -z "$UPSTREAM" ] && UPSTREAM="custom"
          VERSION="${UPSTREAM}-ovaijisuan-$(date +'%Y%m%d')-$(git rev-parse --short HEAD)"
          echo "value=$VERSION" >> $GITHUB_OUTPUT
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Log in to Docker Hub
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to ACR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ secrets.ACR_REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Create & push manifest (Docker Hub - ovaijisuan)
        run: |
          docker buildx imagetools create \
            -t arronlee/new-api:ovaijisuan \
            arronlee/new-api:ovaijisuan-amd64 \
            arronlee/new-api:ovaijisuan-arm64

      - name: Create & push manifest (Docker Hub - versioned)
        run: |
          docker buildx imagetools create \
            -t arronlee/new-api:${VERSION} \
            arronlee/new-api:${VERSION}-amd64 \
            arronlee/new-api:${VERSION}-arm64

      - name: Create & push manifest (ACR - ovaijisuan)
        run: |
          docker buildx imagetools create \
            -t ${{ secrets.ACR_REGISTRY }}/reputationly/new-api:ovaijisuan \
            ${{ secrets.ACR_REGISTRY }}/reputationly/new-api:ovaijisuan-amd64 \
            ${{ secrets.ACR_REGISTRY }}/reputationly/new-api:ovaijisuan-arm64

      - name: Create & push manifest (ACR - versioned)
        run: |
          docker buildx imagetools create \
            -t ${{ secrets.ACR_REGISTRY }}/reputationly/new-api:${VERSION} \
            ${{ secrets.ACR_REGISTRY }}/reputationly/new-api:${VERSION}-amd64 \
            ${{ secrets.ACR_REGISTRY }}/reputationly/new-api:${VERSION}-arm64

      - name: Output manifest digest
        run: |
          echo "### Multi-arch Manifest Digests" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          docker buildx imagetools inspect arronlee/new-api:ovaijisuan >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
